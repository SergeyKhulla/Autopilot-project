[platformio]
src_dir = arduino/autopilot
default_envs = uno
lib_deps =
    arduino-libraries/Servo
[env]
platform = atmelavr
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/Servo
[env:uno]
board = uno
lib_deps =
    arduino-libraries/Servo
[env:nanoatmega328]
board = nanoatmega328
lib_deps =
    arduino-libraries/Servo
[env:nanoatmega328new]
board = nanoatmega328new

lib_deps =
    arduino-libraries/Servo